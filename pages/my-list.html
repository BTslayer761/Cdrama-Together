<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My List — DramaList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Css/variables.css" />
  <link rel="stylesheet" href="../Css/base.css" />
  <link rel="stylesheet" href="../Css/components.css" />
  <link rel="stylesheet" href="../Css/layout.css" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="../index.html">Drama<span>List</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li><a href="top-rated.html">Top Rated</a></li>
      <li><a href="my-list.html" class="active">My List</a></li>
    </ul>
    <div class="nav-right">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="nav-search" placeholder="Search dramas…" />
      </div>
      <div id="nav-auth">
        <a href="login.html" class="btn btn-ghost">Log in</a>
        <a href="register.html" class="btn btn-primary">Sign up</a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">

    <!-- Page header -->
    <div class="page-header">
      <h1>My List</h1>
      <p>Track the dramas you're watching, have completed, or dropped.</p>
    </div>

    <!-- Summary counts -->
    <div class="list-summary">
      <div class="list-summary-item">
        <span class="list-summary-count" id="count-all">—</span>
        <span class="list-summary-label">Total</span>
      </div>
      <div class="list-summary-item">
        <span class="list-summary-count" style="color:var(--red)" id="count-watching">—</span>
        <span class="list-summary-label">Watching</span>
      </div>
      <div class="list-summary-item">
        <span class="list-summary-count" style="color:#3d7a3d" id="count-completed">—</span>
        <span class="list-summary-label">Completed</span>
      </div>
      <div class="list-summary-item">
        <span class="list-summary-count" style="color:#888" id="count-dropped">—</span>
        <span class="list-summary-label">Dropped</span>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs" id="list-filter-tabs" style="margin-top:1.5rem">
      <button class="filter-tab active" data-filter="all"       onclick="setFilter('all')">All</button>
      <button class="filter-tab"        data-filter="watching"  onclick="setFilter('watching')">Watching</button>
      <button class="filter-tab"        data-filter="completed" onclick="setFilter('completed')">Completed</button>
      <button class="filter-tab"        data-filter="dropped"   onclick="setFilter('dropped')">Dropped</button>
    </div>

    <!-- Drama list -->
    <div class="my-list" id="list-container"></div>

  </div>

  <footer>
    <p>DramaList &copy; 2025 &nbsp;·&nbsp;
      <a href="about.html">About</a> &nbsp;·&nbsp;
      <a href="#">Privacy</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../JS/config.js"></script>
  <script src="../JS/supabase-client.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/modal.js"></script>
  <script src="../JS/my-list.js"></script>

</body>
</html>
