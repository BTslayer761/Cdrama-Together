<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — DramaList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Css/variables.css" />
  <link rel="stylesheet" href="../Css/base.css" />
  <link rel="stylesheet" href="../Css/components.css" />
  <link rel="stylesheet" href="../Css/layout.css" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="../index.html">Drama<span>List</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li><a href="top-rated.html">Top Rated</a></li>
      <li><a href="my-list.html">My List</a></li>
    </ul>
    <div class="nav-right">
      <div id="nav-auth">
        <a href="login.html" class="btn btn-ghost">Log in</a>
        <a href="register.html" class="btn btn-primary active">Sign up</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-title">Create an account</div>
      <p class="auth-subtitle">Start tracking your Chinese dramas</p>

      <button class="google-btn" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or</div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" type="password" placeholder="At least 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" id="confirm" type="password" placeholder="••••••••" required />
        </div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:1rem" id="register-btn">
          Create account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <!-- Success message shown after registration -->
  <div class="modal-overlay" id="success-modal" style="display:none">
    <div class="modal" style="text-align:center">
      <div style="font-size:2.5rem;margin-bottom:0.75rem">✉️</div>
      <div class="modal-title">Check your email</div>
      <p class="modal-subtitle" style="margin-bottom:1.5rem">
        We sent a confirmation link to your email address.<br>
        Click it to activate your account.
      </p>
      <a href="login.html" class="btn btn-primary">Go to Log in</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../JS/config.js"></script>
  <script src="../JS/supabase-client.js"></script>
  <script src="../JS/auth.js"></script>
  <script>
    getCurrentUser().then(user => {
      if (user) window.location.href = '../index.html';
    });

    async function handleRegister(e) {
      e.preventDefault();
      const btn   = document.getElementById('register-btn');
      const error = document.getElementById('register-error');
      error.textContent = '';
      error.classList.remove('visible');

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        error.textContent = 'Passwords do not match.';
        error.classList.add('visible');
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled    = true;

      const { error: err } = await signUpWithEmail(email, password);

      if (err) {
        error.textContent = err.message;
        error.classList.add('visible');
        btn.textContent = 'Create account';
        btn.disabled    = false;
      } else {
        document.getElementById('success-modal').style.display = 'flex';
      }
    }
  </script>

</body>
</html>
